<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>습관 트래커</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="theme-color" content="#2da44e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="습관 트래커">
<script>
  (function () {
    var saved = localStorage.getItem('habitTrackerTheme');
    var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
</head>
<body>
  <div id="auth-screen" class="auth-screen" hidden>
    <div class="auth-card">
      <h1 class="app-title">습관 트래커</h1>
      <p class="app-subtitle">Habit Tracker</p>
      <form id="auth-form" class="auth-form">
        <input type="email" id="auth-email-input" placeholder="이메일 주소" required>
        <button type="submit">매직 링크 보내기</button>
      </form>
      <p id="auth-message" class="auth-message"></p>
    </div>
  </div>

  <div id="app" class="container" hidden>
    <header class="app-header">
      <div class="app-header-left">
        <div class="app-icon" aria-hidden="true">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="iconGradient" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#2da44e"/>
                <stop offset="100%" stop-color="#0969da"/>
              </linearGradient>
            </defs>
            <circle cx="24" cy="24" r="22" fill="url(#iconGradient)"/>
            <path d="M14 24.5l6.5 6.5L34 17" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="app-title-group">
          <h1 class="app-title">습관 트래커</h1>
          <p class="app-subtitle">Habit Tracker</p>
        </div>
      </div>
      <div class="app-header-actions">
        <button id="signout-btn" class="data-action-btn" type="button">로그아웃</button>
        <button id="theme-toggle" class="theme-toggle-btn" type="button" aria-label="다크 모드 전환">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
          </svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="stats-toggle-row">
      <div class="data-actions">
        <button id="export-btn" class="data-action-btn" type="button">⬇ 내보내기</button>
        <button id="import-btn" class="data-action-btn" type="button">⬆ 가져오기</button>
        <input type="file" id="import-file-input" accept="application/json" hidden>
      </div>
      <button id="stats-toggle-btn" class="stats-toggle-btn" type="button">
        📊 통계 보기 <span class="chevron">▾</span>
      </button>
    </div>
    <div id="stats-panel" class="stats-panel" hidden></div>

    <form id="add-habit-form" class="add-form">
      <div class="add-form-row">
        <input type="text" id="habit-input" placeholder="새 습관 입력 (예: 물 마시기)" maxlength="30" required>
        <button type="submit">추가</button>
      </div>
      <div id="add-color-picker" class="color-picker"></div>
    </form>

    <p id="empty-message" class="empty-message">아직 등록된 습관이 없어요. 위에서 추가해보세요!</p>
    <div id="habit-list" class="habit-list"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script src="supabaseClient.js"></script>
  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
